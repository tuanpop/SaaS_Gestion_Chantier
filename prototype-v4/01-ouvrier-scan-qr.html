<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw — Scanner QR</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0F172A;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  h1, h2, h3, h4, h5 { font-family: 'Plus Jakarta Sans', sans-serif; }
  .mobile-frame {
    width: 100%;
    max-width: 375px;
    min-height: 100vh;
    background: #0F172A;
    position: relative;
    overflow: hidden;
  }

  /* Scanner Section */
  .scanner-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 32px;
    text-align: center;
  }
  .scanner-title {
    color: white;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .scanner-subtitle {
    color: #94A3B8;
    font-size: 14px;
    margin-bottom: 40px;
  }

  /* Viewfinder */
  .viewfinder-wrapper {
    position: relative;
    width: 240px;
    height: 240px;
    margin-bottom: 40px;
  }
  .pulse-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 2px solid rgba(99, 102, 241, 0.2);
    animation: pulse 2s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.6s; }
  .pulse-ring:nth-child(3) { animation-delay: 1.2s; }
  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
  }
  .viewfinder {
    position: relative;
    width: 240px;
    height: 240px;
    border-radius: 24px;
    overflow: hidden;
    z-index: 2;
  }
  .viewfinder-bg {
    width: 100%;
    height: 100%;
    background: rgba(99, 102, 241, 0.08);
    border: 2px solid rgba(99, 102, 241, 0.3);
    border-radius: 24px;
    position: relative;
  }
  /* Corner brackets */
  .corner {
    position: absolute;
    width: 32px;
    height: 32px;
    border-color: #6366F1;
    border-style: solid;
  }
  .corner-tl { top: -1px; left: -1px; border-width: 4px 0 0 4px; border-radius: 12px 0 0 0; }
  .corner-tr { top: -1px; right: -1px; border-width: 4px 4px 0 0; border-radius: 0 12px 0 0; }
  .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 4px 4px; border-radius: 0 0 0 12px; }
  .corner-br { bottom: -1px; right: -1px; border-width: 0 4px 4px 0; border-radius: 0 0 12px 0; }

  /* Scan line */
  .scan-line {
    position: absolute;
    top: 0;
    left: 16px;
    right: 16px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #6366F1, transparent);
    border-radius: 2px;
    animation: scanMove 2s ease-in-out infinite;
    box-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
  }
  @keyframes scanMove {
    0%, 100% { top: 16px; }
    50% { top: calc(100% - 16px); }
  }

  /* QR icon placeholder */
  .qr-placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(99, 102, 241, 0.25);
  }

  /* Success state */
  .success-section {
    background: #FFFFFF;
    border-radius: 24px 24px 0 0;
    padding: 32px 24px 40px;
    text-align: center;
    margin-top: auto;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    animation: slideUp 0.5s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .success-icon {
    width: 64px;
    height: 64px;
    background: #ECFDF5;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    color: #10B981;
  }
  .success-title {
    font-size: 24px;
    font-weight: 800;
    color: #0F172A;
    margin-bottom: 4px;
  }
  .success-project {
    color: #6366F1;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .success-tasks {
    color: #475569;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .btn-primary {
    display: block;
    width: 100%;
    min-height: 56px;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-decoration: none;
    line-height: 56px;
    text-align: center;
    transition: box-shadow 0.2s;
  }
  .btn-primary:hover {
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
  }

  .logo-top {
    color: white;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>

<a href="00-index.html" style="position:fixed;top:12px;left:12px;z-index:100;background:white;color:#475569;font-size:12px;padding:6px 12px;border-radius:20px;text-decoration:none;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.1);font-family:'Inter',sans-serif">
  <i data-lucide="arrow-left" style="width:14px;height:14px"></i> Index
</a>

<div class="mobile-frame">
  <div class="scanner-section">
    <div class="logo-top">Claw</div>
    <p class="scanner-title">Scannez votre QR code</p>
    <p class="scanner-subtitle">Placez le code dans le cadre ci-dessous</p>

    <div class="viewfinder-wrapper">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="viewfinder">
        <div class="viewfinder-bg">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <div class="scan-line"></div>
          <div class="qr-placeholder">
            <i data-lucide="qr-code" style="width:64px;height:64px"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="success-section">
    <div class="success-icon">
      <i data-lucide="check" style="width:32px;height:32px"></i>
    </div>
    <h2 class="success-title">Bienvenue Mohamed !</h2>
    <p class="success-project">Leclerc — Merignac</p>
    <p class="success-tasks">4 taches aujourd'hui</p>
    <a href="02-ouvrier-selecteur-chantier.html" class="btn-primary">Commencer</a>
  </div>
</div>

<script>lucide.createIcons()</script>
</body>
</html>
