<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawBTP — Ajout photo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Space Grotesk', 'sans-serif'],
            sans: ['DM Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          colors: {
            bg: { DEFAULT: '#0F172A', card: '#1E293B', elevated: '#334155' },
            accent: '#3B82F6',
            danger: { DEFAULT: '#EF4444', glow: 'rgba(239,68,68,0.2)' },
            warning: { DEFAULT: '#F59E0B', glow: 'rgba(245,158,11,0.2)' },
            success: { DEFAULT: '#22C55E', glow: 'rgba(34,197,94,0.2)' },
            text: { DEFAULT: '#F8FAFC', muted: '#94A3B8', dim: '#64748B' },
          }
        }
      }
    }
  </script>
  <style>
    * { touch-action: manipulation; }
    body {
      overscroll-behavior: contain;
      min-height: 100vh; min-height: 100dvh;
      background: #0F172A;
      font-family: 'DM Sans', sans-serif;
      color: #F8FAFC;
    }
    .card-cockpit {
      background: #1E293B;
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 12px;
      transition: border-color 200ms, box-shadow 200ms;
    }
    .glow-accent { box-shadow: 0 0 16px rgba(59,130,246,0.25); border-color: rgba(59,130,246,0.5); }
    .btn-cockpit {
      border: 1px solid rgba(148,163,184,0.3);
      border-radius: 10px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 56px; min-width: 56px;
      transition: all 150ms;
      cursor: pointer;
    }
    .btn-cockpit:active { transform: scale(0.97); }
  </style>
</head>
<body class="bg-bg">
  <div class="max-w-[375px] mx-auto min-h-screen pb-6" style="background:#0F172A">
    <!-- Retour -->
    <div class="px-4 pt-4">
      <a href="00-index.html" class="text-text-dim text-sm flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        Retour au prototype
      </a>
    </div>

    <div class="px-4 pt-2">
      <!-- Retour tache -->
      <a href="04-ouvrier-tache-detail.html" class="text-text-muted text-sm flex items-center gap-1 mb-4">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        Retour a la tache
      </a>

      <h1 class="font-heading text-2xl font-bold mb-6">Ajouter une photo</h1>

      <!-- 2 boutons empiles -->
      <div class="space-y-3 mb-6">
        <button class="btn-cockpit bg-accent text-white w-full flex items-center justify-center gap-3 text-base">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Prendre une photo
        </button>
        <button class="btn-cockpit bg-bg-card text-text w-full flex items-center justify-center gap-3 text-base">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Depuis la galerie
        </button>
      </div>

      <!-- Zone apercu -->
      <div class="card-cockpit aspect-[4/3] flex items-center justify-center mb-6">
        <div class="text-center">
          <svg class="w-12 h-12 text-text-dim mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p class="text-text-dim text-sm">Apercu de la photo</p>
        </div>
      </div>

      <!-- Type photo -->
      <div class="mb-6">
        <label class="text-text-muted text-sm mb-3 block">Type de photo</label>
        <div class="flex gap-2">
          <button class="btn-type flex-1 card-cockpit py-3 text-center text-sm font-semibold font-heading glow-accent text-accent" data-selected="true">
            Avancement
          </button>
          <button class="btn-type flex-1 card-cockpit py-3 text-center text-sm font-semibold font-heading text-text-muted" data-selected="false">
            Probleme
          </button>
          <button class="btn-type flex-1 card-cockpit py-3 text-center text-sm font-semibold font-heading text-text-muted" data-selected="false">
            Livraison
          </button>
        </div>
      </div>

      <!-- Commentaire -->
      <div class="mb-6">
        <label class="text-text-muted text-sm mb-2 block">Commentaire (optionnel)</label>
        <textarea
          class="w-full bg-bg-card border border-white/10 rounded-xl p-4 text-base text-text resize-none focus:outline-none focus:border-accent/50 transition-colors"
          rows="3"
          placeholder="Decris ce que montre la photo..."
        ></textarea>
      </div>

      <!-- Envoyer -->
      <button class="btn-cockpit bg-accent text-white w-full text-base flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Envoyer
      </button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.btn-type').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.btn-type').forEach(b => {
          b.classList.remove('glow-accent', 'text-accent');
          b.classList.add('text-text-muted');
          b.dataset.selected = 'false';
        });
        btn.classList.add('glow-accent', 'text-accent');
        btn.classList.remove('text-text-muted');
        btn.dataset.selected = 'true';
      });
    });
  </script>
</body>
</html>
