<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawBTP — Nouveau Chantier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { heading: ['Space Grotesk','sans-serif'], sans: ['DM Sans','sans-serif'], mono: ['JetBrains Mono','monospace'] },
          colors: {
            bg: { DEFAULT: '#0F172A', card: '#1E293B', elevated: '#334155' },
            accent: '#3B82F6',
            danger: { DEFAULT: '#EF4444' },
            warning: { DEFAULT: '#F59E0B' },
            success: { DEFAULT: '#22C55E' },
            text: { DEFAULT: '#F8FAFC', muted: '#94A3B8', dim: '#64748B' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0F172A; font-family: 'DM Sans', sans-serif; color: #F8FAFC; }
    .sidebar { position:fixed;left:0;top:0;bottom:0;width:240px;background:#0B1120;border-right:1px solid rgba(148,163,184,0.15);padding:24px 0;z-index:40;display:flex;flex-direction:column; }
    .sidebar a { display:flex;align-items:center;gap:12px;padding:12px 24px;color:#64748B;text-decoration:none;font-weight:500;font-size:15px;transition:all 150ms; }
    .sidebar a:hover { color:#94A3B8;background:rgba(59,130,246,0.1); }
    .sidebar a.active { color:#3B82F6;background:rgba(59,130,246,0.15);border-left:3px solid #3B82F6;box-shadow:inset 0 0 20px rgba(59,130,246,0.1); }
    .main-content { margin-left:240px;padding:32px;min-height:100vh; }
    .card-cockpit { background: #1E293B; border: 1px solid rgba(148,163,184,0.15); border-radius: 12px; }
    .glow-accent { box-shadow: 0 0 20px rgba(59,130,246,0.3); }
    .glow-danger { box-shadow: 0 0 15px rgba(239,68,68,0.3); }
    .btn-cockpit { border-radius: 10px; font-weight: 600; font-family: 'Space Grotesk', sans-serif; cursor: pointer; transition: all 150ms; padding: 10px 20px; border: none; }
    .btn-cockpit:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .input-cockpit { background: #334155; border: 1px solid #475569; border-radius: 10px; padding: 14px 16px; font-size: 15px; width: 100%; outline: none; color: #F8FAFC; font-family: 'DM Sans', sans-serif; transition: border-color 150ms, box-shadow 150ms; }
    .input-cockpit:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .input-cockpit::placeholder { color: #64748B; }
    .input-cockpit.error { border-color: #EF4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.15), 0 0 10px rgba(239,68,68,0.2); }
    .label-cockpit { display: block; font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 11px; text-transform: uppercase; color: #64748B; margin-bottom: 8px; letter-spacing: 0.1em; }
  </style>
</head>
<body>
<a href="00-index.html" style="position:fixed;top:12px;left:12px;z-index:100;background:rgba(30,41,59,0.9);color:#94A3B8;font-size:12px;padding:6px 12px;border-radius:20px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-family:DM Sans,sans-serif">&#8592; Index</a>
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="px-6 mb-8">
      <h1 class="font-heading font-[700] text-[22px]"><span class="text-accent" style="text-shadow:0 0 15px rgba(59,130,246,0.5)">Claw</span>BTP</h1>
    </div>
    <a href="14-admin-login.html" class="text-text-dim text-sm !text-[13px] mb-2">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Prototype
    </a>
    <div class="flex-1">
      <a href="15-admin-dashboard.html">
        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
      </a>
      <a href="16-admin-chantier-detail.html" class="active">
        <i data-lucide="building-2" class="w-5 h-5"></i> Chantiers
      </a>
      <a href="18-admin-equipe.html">
        <i data-lucide="users" class="w-5 h-5"></i> Equipe
      </a>
      <a href="19-admin-notifications.html">
        <i data-lucide="bell" class="w-5 h-5"></i> Notifications
      </a>
      <a href="20-admin-clawbot.html">
        <i data-lucide="bot" class="w-5 h-5"></i> ClawBot
      </a>
    </div>
    <div class="px-6 mt-auto pt-4 border-t border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-accent/20 flex items-center justify-center text-accent font-heading font-bold text-sm" style="box-shadow:0 0 12px rgba(59,130,246,0.3)">FS</div>
        <div>
          <div class="text-sm font-medium text-text">Frederic S.</div>
          <div class="text-xs text-text-dim">Admin</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-content">
    <div class="flex items-center gap-4 mb-8">
      <a href="15-admin-dashboard.html" class="text-text-dim hover:text-text-muted transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
      </a>
      <h1 class="font-heading font-bold text-[26px] text-text">Nouveau chantier</h1>
    </div>

    <div class="card-cockpit p-8 max-w-3xl">
      <div class="grid grid-cols-2 gap-6">
        <!-- Nom du chantier -->
        <div class="col-span-2">
          <label class="label-cockpit">Nom du chantier</label>
          <input type="text" placeholder="Ex : Residence Les Oliviers" class="input-cockpit" value="Renovation Petit">
        </div>

        <!-- Client -->
        <div>
          <label class="label-cockpit">Client</label>
          <input type="text" placeholder="Nom du client ou societe" class="input-cockpit" value="M. Petit">
        </div>

        <!-- Conducteur -->
        <div>
          <label class="label-cockpit">Conducteur de travaux</label>
          <select class="input-cockpit text-text-muted">
            <option>Jean-Marc Vidal</option>
            <option>Sophie Laurent</option>
            <option>Marc Dubois</option>
          </select>
        </div>

        <!-- Adresse -->
        <div class="col-span-2">
          <label class="label-cockpit">Adresse du chantier</label>
          <input type="text" placeholder="Numero et rue" class="input-cockpit" value="45 avenue de la Republique">
        </div>

        <!-- Code postal (avec erreur) -->
        <div>
          <label class="label-cockpit">Code postal</label>
          <input type="text" placeholder="69000" class="input-cockpit error" value="6900">
          <p class="text-danger text-xs mt-2 flex items-center gap-1" style="text-shadow:0 0 6px rgba(239,68,68,0.3)">
            <i data-lucide="alert-circle" class="w-3 h-3"></i>
            Code postal invalide (5 chiffres requis)
          </p>
        </div>

        <!-- Ville -->
        <div>
          <label class="label-cockpit">Ville</label>
          <input type="text" placeholder="Lyon" class="input-cockpit" value="Lyon">
        </div>

        <!-- Budget -->
        <div>
          <label class="label-cockpit">Budget previsionnel (&#8364;)</label>
          <input type="text" placeholder="50 000" class="input-cockpit font-mono" value="85 000">
        </div>

        <!-- Date debut -->
        <div>
          <label class="label-cockpit">Date de debut</label>
          <input type="date" class="input-cockpit" value="2026-04-15">
        </div>

        <!-- Date fin -->
        <div>
          <label class="label-cockpit">Date de fin prevue</label>
          <input type="date" class="input-cockpit" value="2026-08-30">
        </div>

        <!-- Description -->
        <div class="col-span-2">
          <label class="label-cockpit">Description / Notes</label>
          <textarea rows="3" placeholder="Details supplementaires..." class="input-cockpit resize-none"></textarea>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3 mt-8 pt-6 border-t border-white/10">
        <button class="btn-cockpit bg-accent text-white px-8 py-3 glow-accent flex items-center gap-2">
          <i data-lucide="plus" class="w-4 h-4"></i> Creer le chantier
        </button>
        <a href="15-admin-dashboard.html" class="btn-cockpit bg-bg-card text-text-muted border border-white/15 px-8 py-3">
          Annuler
        </a>
      </div>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
