# Supabase local dev config — ClawBTP
# Ref: https://supabase.com/docs/guides/local-development/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "10MiB"   # Max 10Mo par upload (specs.md §Upload photos)

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false          # DÉSACTIVÉ — invitation uniquement (D-02, ADR-002, specs.md §Auth)
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 12  # Min 12 caractères (CreateOrgSchema, LoginSchema)
password_requirements = ""

[auth.email]
# IMPORTANT : Supabase CLI v2+ interprète enable_signup=false comme "désactiver entièrement
# le provider email" (login + signup). On laisse donc true ici pour permettre le login,
# et on bloque le signup AU NIVEAU APPLICATIF :
#   - aucune page publique n'expose POST /auth/v1/signup
#   - /api/organisations utilise adminClient.auth.admin.createUser (server-side admin)
#   - les invitations conducteur/ouvrier passent par admin.inviteUserByEmail
# Cf. D-02, ADR-002, specs.md §Auth.
enable_signup = true
enable_confirmations = false   # Confirmations gérées via le flow d'invitation (admin.createUser email_confirm=true)
secure_password_change = true
double_confirm_changes = true  # specs.md §Auth — double confirmation des changements d'email

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false    # SUPPRIMÉ — ADR-001

[auth.external.facebook]
enabled = false    # SUPPRIMÉ — ADR-001

[auth.external.github]
enabled = false

[auth.external.twitter]
enabled = false

[auth.external.apple]
enabled = false

[auth.external.discord]
enabled = false

[auth.external.twitch]
enabled = false

[auth.external.linkedin_oidc]
enabled = false

# Auth Hook — injection custom claims JWT (organisation_id + role)
# Branché sur custom_access_token_hook pour injecter organisation_id + role dans le JWT
# Requis pour les policies RLS (auth.jwt() ->> 'organisation_id')
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[analytics]
enabled = false

# [functions] global verify_jwt = true retiré (incompatible Supabase CLI v2+).
# Le défaut est déjà verify_jwt = true. Pour le surcharger sur une fonction précise :
#   [functions.nom-fonction]
#   verify_jwt = false
