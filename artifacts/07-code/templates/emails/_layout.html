<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="fr">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
  <meta name="color-scheme" content="light only" />
  <meta name="supported-color-schemes" content="light only" />
  <title>{{TITLE}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet" type="text/css" />
  <style>
    /* Reset client-mail */
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img { -ms-interpolation-mode:bicubic; border:0; outline:none; text-decoration:none; }
    body { margin:0 !important; padding:0 !important; width:100% !important; }

    /* Mobile */
    @media screen and (max-width:620px) {
      .cb-card { padding:32px 24px !important; }
      .cb-wrapper { padding:24px 12px !important; }
      .cb-h1 { font-size:22px !important; line-height:1.3 !important; }
      .cb-btn a { padding:14px 24px !important; font-size:15px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#FAFAF8;color:#163958;font-family:'Public Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">

  <!-- Preheader (preview client mail) -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:#FAFAF8;opacity:0;">
    {{PREHEADER}}
  </div>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#FAFAF8;">
    <tr>
      <td align="center" class="cb-wrapper" style="padding:48px 20px;">

        <!-- Header logo -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;">
          <tr>
            <td align="center" style="padding:0 0 32px 0;">
              <a href="https://saas-gestion-chantier.tanren-studio.com" style="text-decoration:none;display:inline-block;" target="_blank">
                <span style="font-family:'Outfit',Georgia,'Times New Roman',serif;font-size:28px;font-weight:800;letter-spacing:-0.5px;"><span style="color:#F97316;">Claw</span><span style="color:#163958;">BTP</span></span>
              </a>
            </td>
          </tr>
        </table>

        <!-- Card -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;background-color:#FFFFFF;border:2px solid #000000;">
          <tr>
            <td class="cb-card" style="padding:48px 52px;">

              <h1 class="cb-h1" style="margin:0 0 24px 0;font-family:'Outfit',Georgia,'Times New Roman',serif;font-size:26px;line-height:1.25;font-weight:700;color:#163958;letter-spacing:-0.4px;">
                {{TITLE}}
              </h1>

              <div style="font-family:'Public Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:15px;line-height:1.7;color:#222222;">
                {{BODY}}
              </div>

            </td>
          </tr>
        </table>

        <!-- Footer -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;">
          <tr>
            <td align="center" style="padding:32px 24px 12px 24px;font-family:'Public Sans',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;font-size:12px;line-height:1.7;color:#555555;">
              <div style="font-family:'Outfit',Georgia,serif;font-size:14px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;">
                <span style="color:#F97316;">Claw</span><span style="color:#163958;">BTP</span>
              </div>
              <div style="font-style:italic;">La gestion de chantier dédiée au second oeuvre.</div>
              <div style="margin-top:12px;">
                <a href="https://saas-gestion-chantier.tanren-studio.com" style="color:#555555;text-decoration:underline;" target="_blank">saas-gestion-chantier.tanren-studio.com</a>
              </div>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
