# ============================================================
# ClawBTP — Docker Swarm Stack
# Déployer avec : docker stack deploy -c docker-compose.yml clawbtp
# ============================================================
# SECRETS : créer avant le premier déploiement (voir README.md)
# Toutes les variables sensibles passent par Docker secrets —
# jamais en clair dans environment:
# ============================================================

version: "3.9"

services:

  # ----------------------------------------------------------
  # app — Next.js 15 SSR
  # ----------------------------------------------------------
  app:
    image: ghcr.io/GITHUB_ORG/clawbtp:${IMAGE_TAG:-latest}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1           # Rolling update un replica à la fois
        delay: 30s               # Laisse le temps au healthcheck de passer
        failure_action: rollback
        order: start-first       # Démarre le nouveau avant de stopper l'ancien
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      labels:
        # Traefik routing
        - "traefik.enable=true"
        - "traefik.http.routers.clawbtp.rule=Host(`app.clawbtp.fr`)"
        - "traefik.http.routers.clawbtp.entrypoints=websecure"
        - "traefik.http.routers.clawbtp.tls.certresolver=letsencrypt"
        - "traefik.http.services.clawbtp.loadbalancer.server.port=3000"
        - "traefik.http.services.clawbtp.loadbalancer.healthcheck.path=/api/health"
        - "traefik.http.services.clawbtp.loadbalancer.healthcheck.interval=30s"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Variables publiques (non-sensibles, passées en clair)
      - NEXT_PUBLIC_APP_URL=https://app.clawbtp.fr
      # Redis — réseau Swarm interne
      - REDIS_URL=redis://redis:6379
    secrets:
      - next_public_supabase_url
      - next_public_supabase_anon_key
      - next_public_vapid_key
      - supabase_service_role_key
      - qr_encryption_key
      - cron_secret
      - anthropic_api_key
      - vapid_private_key
      - openweather_api_key
      - resend_api_key
    networks:
      - clawbtp_net
      - traefik_public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ----------------------------------------------------------
  # cron — supercronic
  # replicas: 1 OBLIGATOIRE — jamais 2 (exécutions dupliquées)
  # ----------------------------------------------------------
  cron:
    image: ghcr.io/GITHUB_ORG/clawbtp-cron:${IMAGE_TAG:-latest}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    environment:
      # URL interne Swarm (pas exposée à Internet)
      - APP_INTERNAL_URL=http://app:3000
    secrets:
      - cron_secret
    networks:
      - clawbtp_net

  # ----------------------------------------------------------
  # redis — Sessions ouvriers + rate limiting
  # replicas: 1 — Redis Standalone (pas Cluster en pilote)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --save 60 1000
      --loglevel warning
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    deploy:
      replicas: 1
      placement:
        constraints:
          # Toujours sur le même noeud pour la persistance volume
          - "node.role == manager"
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
    volumes:
      - redis_data:/data
    networks:
      - clawbtp_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------
  # traefik — Reverse proxy + TLS automatique Let's Encrypt
  # ----------------------------------------------------------
  traefik:
    image: traefik:v3.3
    command:
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=traefik_public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=contact@clawbtp.fr"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--accesslog=true"
      - "--log.level=WARN"
      # Dashboard désactivé en production (activer uniquement via tunnel SSH pour debug)
      - "--api=false"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role == manager"
      restart_policy:
        condition: on-failure
    networks:
      - traefik_public

volumes:
  redis_data:
    driver: local
  traefik_letsencrypt:
    driver: local

networks:
  clawbtp_net:
    driver: overlay
    internal: true          # Réseau interne — app/cron/redis ne sont pas exposés directement
  traefik_public:
    driver: overlay
    external: true          # Créé manuellement : docker network create --driver=overlay traefik_public

secrets:
  # Créer avec : echo "valeur" | docker secret create nom_secret -
  next_public_supabase_url:
    external: true
  next_public_supabase_anon_key:
    external: true
  next_public_vapid_key:
    external: true
  supabase_service_role_key:
    external: true
  qr_encryption_key:
    external: true
  cron_secret:
    external: true
  anthropic_api_key:
    external: true
  vapid_private_key:
    external: true
  openweather_api_key:
    external: true
  resend_api_key:
    external: true
