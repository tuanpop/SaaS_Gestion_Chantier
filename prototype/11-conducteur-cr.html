  <script>

  <style>
    * { touch-action: manipulation; }

      background: #FAFAF8;
      font-family: 'Public Sans', sans-serif;
      color: #0F172A;
    }
    .card-brutal {
      border: 2px solid #000;
      box-shadow: 3px 3px 0 #000;
      border-radius: 6px;
      background: #fff;
      transition: transform 100ms, box-shadow 100ms;
    }
    .card-brutal:active {
      box-shadow: 1px 1px 0 #000;
      transform: translate(2px, 2px);
    }
    .btn-brutal {
      border: 2px solid #000;
      box-shadow: 3px 3px 0 #000;
      border-radius: 6px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      transition: transform 100ms, box-shadow 100ms;
      cursor: pointer;
    }
    .btn-brutal:active {
      box-shadow: 1px 1px 0 #000;
      transform: translate(2px, 2px);
    }
    .badge { border: 2px solid; border-radius: 4px; padding: 2px 10px; font-weight: 600; font-size: 13px; display: inline-block; }
    .badge-danger { background: #FEE2E2; border-color: #DC2626; color: #DC2626; }
    .badge-success { background: #DCFCE7; border-color: #22C55E; color: #166534; }
    .badge-warning { background: #FEF3C7; border-color: #F59E0B; color: #92400E; }
    .badge-muted { background: #F1F5F9; border-color: #94A3B8; color: #64748B; }
    .badge-primary { background: #E0F2FE; border-color: #0284C7; color: #0369A1; }
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      background: #fff; border-top: 2px solid #000;
      display: flex; justify-content: space-around; align-items: center;
      padding: 8px 0 env(safe-area-inset-bottom, 8px);
      z-index: 50;
    }
    .bottom-nav a {
      display: flex; flex-direction: column; align-items: center;
      font-size: 11px; font-weight: 500; color: #64748B;
      gap: 2px; text-decoration: none; padding: 4px 8px;
      position: relative;
    }
    .bottom-nav a.active { color: #F97316; font-weight: 700; }
    .bottom-nav a.active::after {
      content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      width: 24px; height: 3px; background: #F97316; border-radius: 2px;
    }
    .cr-textarea {
      border: 2px solid #000;
      border-radius: 6px;
      background: #FAFAF8;
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      font-family: 'Public Sans', sans-serif;

  <a href="00-index.html" style="position:fixed;top:12px;left:12px;z-index:100;background:rgba(255,255,255,0.95);color:#475569;font-size:12px;padding:6px 12px;border-radius:20px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">&larr; Index</a>

    <!-- Contenu -->
    <main class="px-4 pt-4 pb-40 flex flex-col gap-3">

      <!-- CR du jour — déplié -->
      <div class="card-brutal p-4">
        <div class="flex items-center justify-between mb-3">
          <div class="font-heading font-semibold text-[15px]">CR — Chantier Leclerc — 02/04/2026</div>
          <span class="badge badge-muted">Brouillon</span>
        </div>

        <!-- Section Avancement -->
        <div class="mb-3">
          <div class="flex items-center gap-1.5 mb-1.5">
            <i data-lucide="trending-up" class="w-4 h-4 text-success"></i>
            <span class="font-heading font-semibold text-sm">Avancement</span>
          </div>
          <textarea class="cr-textarea" rows="3">Pose des cloisons terminée RDC (4 pièces). Enduit commencé salle de bain. Mohamed a terminé le carrelage entrée.</textarea>
        </div>

        <!-- Section Blocages -->
        <div class="mb-3">
          <div class="flex items-center gap-1.5 mb-1.5">
            <i data-lucide="alert-triangle" class="w-4 h-4 text-danger"></i>
            <span class="font-heading font-semibold text-sm">Blocages</span>
          </div>
          <textarea class="cr-textarea" rows="3">Attente livraison plinthes prévue demain matin. Manque 2 sacs d'enduit.</textarea>
        </div>

        <!-- Section À prévoir -->
        <div class="mb-3">
          <div class="flex items-center gap-1.5 mb-1.5">
            <i data-lucide="calendar-clock" class="w-4 h-4 text-accent"></i>
            <span class="font-heading font-semibold text-sm">À prévoir</span>
          </div>
          <textarea class="cr-textarea" rows="3">Pose plinthes dès réception. Électricien prévu jeudi pour les finitions.</textarea>
        </div>

        <!-- Boutons -->
        <div class="flex gap-2 mt-1">
          <button class="btn-brutal bg-accent text-white px-4 py-2.5 flex items-center gap-2 flex-1 justify-center text-sm">
            <i data-lucide="file-text" class="w-4 h-4"></i> Valider et exporter PDF
          </button>
          <button class="btn-brutal bg-white text-black px-4 py-2.5 flex items-center gap-2 justify-center text-sm">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Régénérer
          </button>
        </div>
      </div>

      <!-- CR précédent — replié -->
      <div class="card-brutal p-3">
        <div class="flex items-center justify-between">
          <div>
            <div class="font-heading font-semibold text-sm">CR — Chantier Martin — 01/04/2026</div>
            <div class="text-muted text-xs mt-0.5">Maison Martin — Talence</div>
          </div>
          <span class="badge badge-primary">Validé</span>
        </div>
      </div>

      <!-- CR précédent — replié -->
