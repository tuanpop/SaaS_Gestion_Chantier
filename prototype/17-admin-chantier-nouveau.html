<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawBTP — Nouveau chantier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            sans: ['Public Sans', 'sans-serif']
          },
          colors: {
            primary: { DEFAULT: '#334155', light: '#475569', dark: '#1E293B' },
            accent: '#F97316',
            danger: { DEFAULT: '#DC2626', bg: '#FEE2E2' },
            warning: { DEFAULT: '#F59E0B', bg: '#FEF3C7' },
            success: { DEFAULT: '#22C55E', bg: '#DCFCE7' },
            surface: '#F1F5F9',
            cream: '#FAFAF8',
            muted: '#64748B',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: #FAFAF8;
      font-family: 'Public Sans', sans-serif;
      color: #0F172A;
    }
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 240px; background: #1E293B; color: #fff;
      padding: 24px 0; z-index: 40;
      border-right: 2px solid #000;
    }
    .sidebar a {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; color: #94A3B8; text-decoration: none;
      font-weight: 500; font-size: 15px;
      transition: background 150ms, color 150ms;
    }
    .sidebar a:hover { background: #334155; color: #fff; }
    .sidebar a.active {
      background: #F97316; color: #fff; font-weight: 700;
      border-left: 4px solid #fff;
    }
    .main-content {
      margin-left: 240px; padding: 32px; min-height: 100vh;
    }
    .card-brutal {
      border: 2px solid #000;
      box-shadow: 4px 4px 0 #000;
      border-radius: 6px;
      background: #fff;
    }
    .btn-brutal {
      border: 2px solid #000;
      box-shadow: 3px 3px 0 #000;
      border-radius: 6px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      transition: transform 100ms, box-shadow 100ms;
      cursor: pointer;
      padding: 10px 20px;
    }
    .btn-brutal:hover {
      box-shadow: 2px 2px 0 #000;
      transform: translate(1px, 1px);
    }
    .btn-brutal:active {
      box-shadow: 0px 0px 0 #000;
      transform: translate(3px, 3px);
    }
    .input-brutal {
      border: 2px solid #000;
      border-radius: 6px;
      padding: 12px;
      font-size: 16px;
      width: 100%;
      outline: none;
      font-family: 'Public Sans', sans-serif;
      background: #fff;
    }
    .input-brutal:focus {
      border-color: #F97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
    }
    .input-brutal.error {
      border-color: #DC2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,0.15);
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="px-6 mb-2">
      <a href="00-index.html" class="text-xs !text-[#64748B] !p-0 mb-4 hover:!text-white !font-normal"><i data-lucide="arrow-left" class="w-3 h-3"></i> Prototype</a>
    </div>
    <div class="px-6 mb-8">
      <h1 class="font-heading font-[800] text-[22px]"><span class="text-accent">Claw</span>BTP</h1>
    </div>
    <a href="15-admin-dashboard.html"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
    <a href="16-admin-chantier-detail.html" class="active"><i data-lucide="building-2" class="w-5 h-5"></i> Chantiers</a>
    <a href="18-admin-equipe.html"><i data-lucide="users" class="w-5 h-5"></i> Équipe</a>
    <a href="19-admin-notifications.html"><i data-lucide="bell" class="w-5 h-5"></i> Notifications</a>
    <a href="20-admin-clawbot.html"><i data-lucide="bot" class="w-5 h-5"></i> ClawBot</a>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <h1 class="font-heading font-bold text-[28px] mb-6">Nouveau chantier</h1>

    <div class="card-brutal p-8 max-w-3xl">
      <div class="space-y-5">
        <!-- Nom du chantier -->
        <div>
          <label class="block font-heading font-semibold text-xs uppercase text-muted mb-2 tracking-wide">Nom du chantier</label>
          <input type="text" placeholder="Ex : Résidence Les Pins" class="input-brutal">
        </div>

        <!-- Client -->
        <div>
          <label class="block font-heading font-semibold text-xs uppercase text-muted mb-2 tracking-wide">Client</label>
          <input type="text" placeholder="Nom du client ou de la société" class="input-brutal">
        </div>

        <!-- Adresse -->
        <div>
          <label class="block font-heading font-semibold text-xs uppercase text-muted mb-2 tracking-wide">Adresse</label>
          <input type="text" placeholder="14 rue des Lilas" class="input-brutal">
        </div>

        <!-- Code postal (avec erreur) -->
        <div>
          <label class="block font-heading font-semibold text-xs uppercase text-muted mb-2 tracking-wide">Code postal</label>
          <input type="text" value="1234" class="input-brutal error">
          <p class="text-danger text-sm font-medium mt-1">Code postal invalide (5 chiffres requis)</p>
        </div>

        <!-- Budget -->
        <div>
          <label class="block font-heading font-semibold text-xs uppercase text-muted mb-2 tracking-wide">Budget alloué (€)</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-muted font-bold text-lg">€</span>
            <input type="text" inputmode="numeric" placeholder="65 000" class="input-brutal pl-9">
          </div>
        </div>

        <!-- Dates -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block font-heading font-semibold text-xs uppercase text-muted mb-2 tracking-wide">Date début</label>
            <input type="date" class="input-brutal">
          </div>
          <div>
            <label class="block font-heading font-semibold text-xs uppercase text-muted mb-2 tracking-wide">Date fin prévue</label>
            <input type="date" class="input-brutal">
          </div>
        </div>

        <!-- Boutons -->
        <div class="flex gap-4 pt-4">
          <button class="btn-brutal bg-accent text-white">Créer le chantier</button>
          <a href="15-admin-dashboard.html" class="btn-brutal bg-white text-primary inline-block text-center">Annuler</a>
        </div>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
