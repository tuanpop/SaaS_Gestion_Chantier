<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawBTP — Conducteur — ClawBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            sans: ['Public Sans', 'sans-serif']
          },
          colors: {
            primary: { DEFAULT: '#334155', light: '#475569', dark: '#1E293B' },
            accent: '#F97316',
            danger: { DEFAULT: '#DC2626', bg: '#FEE2E2' },
            warning: { DEFAULT: '#F59E0B', bg: '#FEF3C7' },
            success: { DEFAULT: '#22C55E', bg: '#DCFCE7' },
            surface: '#F1F5F9',
            cream: '#FAFAF8',
            muted: '#64748B',
          }
        }
      }
    }
  </script>
  <style>
    * { touch-action: manipulation; }
    body {
      min-height: 100vh; min-height: 100dvh;
      background: #FAFAF8;
      font-family: 'Public Sans', sans-serif;
      color: #0F172A;
    }
    .card-brutal {
      border: 2px solid #000;
      box-shadow: 3px 3px 0 #000;
      border-radius: 6px;
      background: #fff;
      transition: transform 100ms, box-shadow 100ms;
    }
    .card-brutal:active {
      box-shadow: 1px 1px 0 #000;
      transform: translate(2px, 2px);
    }
    .btn-brutal {
      border: 2px solid #000;
      box-shadow: 3px 3px 0 #000;
      border-radius: 6px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      transition: transform 100ms, box-shadow 100ms;
      cursor: pointer;
    }
    .btn-brutal:active {
      box-shadow: 1px 1px 0 #000;
      transform: translate(2px, 2px);
    }
    .badge { border: 2px solid; border-radius: 4px; padding: 2px 10px; font-weight: 600; font-size: 13px; display: inline-block; }
    .badge-danger { background: #FEE2E2; border-color: #DC2626; color: #DC2626; }
    .badge-success { background: #DCFCE7; border-color: #22C55E; color: #166534; }
    .badge-warning { background: #FEF3C7; border-color: #F59E0B; color: #92400E; }
    .badge-muted { background: #F1F5F9; border-color: #94A3B8; color: #64748B; }
    .badge-primary { background: #E0F2FE; border-color: #0284C7; color: #0369A1; }
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      background: #fff; border-top: 2px solid #000;
      display: flex; justify-content: space-around; align-items: center;
      padding: 8px 0 env(safe-area-inset-bottom, 8px);
      z-index: 50;
    }
    .bottom-nav a {
      display: flex; flex-direction: column; align-items: center;
      font-size: 11px; font-weight: 500; color: #64748B;
      gap: 2px; text-decoration: none; padding: 4px 8px;
      position: relative;
    }
    .bottom-nav a.active { color: #F97316; font-weight: 700; }
    .bottom-nav a.active::after {
      content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      width: 24px; height: 3px; background: #F97316; border-radius: 2px;
    }
    @keyframes bounce-dot {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .dot-bounce { animation: bounce-dot 1.2s infinite; display: inline-block; }
    .dot-bounce:nth-child(2) { animation-delay: 0.15s; }
    .dot-bounce:nth-child(3) { animation-delay: 0.3s; }
  </style>
</head>
<body>
  <a href="00-index.html" style="position:fixed;top:12px;left:12px;z-index:100;background:rgba(255,255,255,0.95);color:#475569;font-size:12px;padding:6px 12px;border-radius:20px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">&larr; Index</a>
  <div class="max-w-[390px] mx-auto min-h-screen bg-cream relative flex flex-col">

    <!-- Header -->
    <header class="bg-primary-dark px-4 py-4 flex items-center gap-2">
      <i data-lucide="bot" class="w-6 h-6 text-white"></i>
      <h1 class="font-heading text-white text-xl font-bold">ClawBot</h1>
    </header>

    <!-- Zone messages -->
    <main class="flex-1 px-4 pt-4 pb-[180px] flex flex-col gap-3 bg-cream">

      <!-- Bulle ClawBot -->
      <div class="max-w-[85%]">
        <div class="text-accent text-xs font-bold mb-1">ClawBot</div>
        <div class="card-brutal p-3 border-l-[4px] border-l-accent">
          <p class="text-sm">Bonjour Sophie ! 2 tâches non saisies aujourd'hui sur Leclerc.</p>
        </div>
      </div>

      <!-- Bulle utilisateur -->
      <div class="max-w-[85%] self-end">
        <div class="card-brutal p-3 bg-primary-dark text-white border-l-0">
          <p class="text-sm">Assigne la tâche plomberie à Mohamed</p>
        </div>
      </div>

      <!-- Bulle ClawBot avec action -->
      <div class="max-w-[85%]">
        <div class="text-accent text-xs font-bold mb-1">ClawBot</div>
        <div class="card-brutal p-3 border-l-[4px] border-l-accent">
          <p class="text-sm mb-3">Assigner "Pose plomberie" à Mohamed sur Leclerc.</p>
          <div class="flex gap-2">
            <button class="btn-brutal bg-success text-white px-3 py-1.5 text-xs flex items-center gap-1">
              <i data-lucide="check" class="w-3.5 h-3.5"></i> Confirmer
            </button>
            <button class="btn-brutal bg-white text-danger px-3 py-1.5 text-xs flex items-center gap-1">
              <i data-lucide="x" class="w-3.5 h-3.5"></i> Annuler
            </button>
          </div>
        </div>
      </div>

      <!-- Indicateur streaming -->
      <div class="max-w-[85%]">
        <div class="text-accent text-xs font-bold mb-1">ClawBot réfléchit...</div>
        <div class="card-brutal p-3 inline-block border-l-[4px] border-l-accent">
          <div class="flex gap-1 items-center h-5">
            <span class="dot-bounce w-2 h-2 bg-muted rounded-full"></span>
            <span class="dot-bounce w-2 h-2 bg-muted rounded-full"></span>
            <span class="dot-bounce w-2 h-2 bg-muted rounded-full"></span>
          </div>
        </div>
      </div>

    </main>

    <!-- Input fixe -->
    <div class="fixed bottom-[60px] left-1/2 -translate-x-1/2 w-full max-w-[390px] px-4 pb-2 bg-cream z-40" style="padding-bottom: env(safe-area-inset-bottom, 8px);">
      <div class="flex items-center border-2 border-black rounded-[6px] bg-white overflow-hidden">
        <input type="text" placeholder="Écrivez un message..." class="flex-1 px-3 py-2.5 text-sm bg-transparent border-none outline-none font-sans">
        <button class="w-10 h-10 bg-accent flex items-center justify-center shrink-0 rounded-r">
          <i data-lucide="send" class="w-4 h-4 text-white"></i>
        </button>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="08-conducteur-chantiers.html">
        <i data-lucide="building-2" class="w-5 h-5"></i>
        <span>Chantiers</span>
      </a>
      <a href="10-conducteur-taches.html">
        <i data-lucide="list-checks" class="w-5 h-5"></i>
        <span>Tâches</span>
      </a>
      <a href="11-conducteur-cr.html">
        <i data-lucide="file-text" class="w-5 h-5"></i>
        <span>CR</span>
      </a>
      <a href="12-conducteur-alertes.html" class="relative">
        <i data-lucide="bell" class="w-5 h-5"></i>
        <span>Alertes</span>
        <span class="absolute -top-1 right-0 w-4 h-4 bg-danger text-white text-[10px] font-bold rounded-full flex items-center justify-center">3</span>
      </a>
      <a href="13-conducteur-clawbot.html" class="active">
        <i data-lucide="bot" class="w-5 h-5"></i>
        <span>ClawBot</span>
      </a>
    </nav>

  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
