name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: artifacts/07-code

jobs:
  quality:
    name: Lint + TypeCheck + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: artifacts/07-code/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Unit tests (Vitest)
        run: npm test
        env:
          NODE_ENV: test

      - name: Next.js production build (catch RSC + routing bugs)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'
          NEXT_PUBLIC_APP_URL: 'https://placeholder.local'
          NEXT_PUBLIC_VAPID_KEY: 'placeholder'

      # Sprint 3 — Audit securite endpoints ouvrier (K3-CR-02, D-3-004)
      # Detecte tout SELECT * ou reference a note_privee_conducteur dans /api/ouvrier/
      # Ces patterns sont interdits : SELECT explicite obligatoire (defense niveau 1/4)
      - name: Audit SELECT * dans endpoints ouvrier (K3-CR-02)
        working-directory: artifacts/07-code
        run: |
          echo "=== Audit SELECT * dans /app/api/ouvrier/ ==="
          # Chercher .select('*') ou .select("*") — exclure les commentaires
          if grep -rn "\.select(['\"]\\*['\"])" app/api/ouvrier/ 2>/dev/null | grep -v "^\s*//"; then
            echo "FAIL: SELECT * detecte dans un endpoint ouvrier — K3-CR-02 violation"
            exit 1
          fi
          echo "OK: Aucun SELECT * detecte"

          echo "=== Audit note_privee_conducteur dans /app/api/ouvrier/ ==="
          # Chercher note_privee_conducteur — exclure les commentaires
          if grep -rn "note_privee_conducteur" app/api/ouvrier/ 2>/dev/null | grep -v "^\s*//" | grep -v "AUDIT:"; then
            echo "FAIL: note_privee_conducteur reference dans un endpoint ouvrier — D-3-004 violation"
            exit 1
          fi
          echo "OK: note_privee_conducteur absent des endpoints ouvrier"
